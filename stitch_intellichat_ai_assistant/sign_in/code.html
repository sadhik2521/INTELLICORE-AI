</div>

</div>
<div class="relative group">
<input class="sleek-input w-full py-md px-1 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" placeholder="••••••••••••" type="password"/>
</div>
</div>
<button class="w-full primary-gradient h-14 rounded-xl font-label-md text-headline-lg text-white shadow-lg active:scale-95 transition-transform duration-300 flex items-center justify-center gap-md" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
