<style>
        body {
            background: radial-gradient(circle at top right, #1d2022, #101415);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .ai-aura {
            filter: blur(64px);
            background: linear-gradient(135deg, #2e5bff 0%, #5516be 100%);

        }

            box-shadow: 0 0 80px 20px rgba(46, 91, 255, 0.4);

<body class="bg-surface-dim text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Top App Bar (Suppressed Shell context for onboarding, but custom implementation for Brand) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/60 backdrop-blur-xl border-b border-white/10">
<div class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-violet-400 font-inter tracking-tight">
            Nexus AI
        </div>
<div class="flex items-center gap-xs">
<span class="font-label-md text-label-md text-slate-400">EN</span>
<span class="material-symbols-outlined text-slate-400" style="font-size: 18px;">language</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center relative px-margin">
<!-- AI Aura Background Elements -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] ai-aura rounded-full"></div>
<!-- Central Visual: Glowing AI Orb -->
<div class="relative z-10 mb-xl flex items-center justify-center">
<div class="w-64 h-64 rounded-full bg-gradient-to-tr from-primary-container via-secondary-container to-violet-400 orb-glow flex items-center justify-center border border-white/20">
<div class="w-48 h-48 rounded-full bg-slate-950/40 backdrop-blur-3xl flex items-center justify-center relative overflow-hidden">
<!-- Internal abstract pulses -->
<div class="absolute inset-0 bg-gradient-to-b from-blue-400/20 to-transparent"></div>
<span class="material-symbols-outlined text-7xl text-white opacity-80" data-weight="fill">auto_awesome</span>
</div>
</div>
<!-- Decorative Orbitals -->
<div class="absolute w-80 h-80 rounded-full border border-white/5 animate-pulse"></div>
<div class="absolute w-[22rem] h-[22rem] rounded-full border border-white/10 opacity-40"></div>
</div>
<!-- Headline & Content -->
<div class="relative z-20 text-center max-w-md">
<h1 class="font-headline-xl text-headline-xl mb-md leading-tight text-white">
                Experience the Future of Intelligence
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-4">
                Unlock the power of Nexus AI. Your personalized companion for creativity, productivity, and complex problem-solving.
            </p>
</div>
<!-- Action Card (Bento-style layout fragment) -->
<div class="relative z-20 w-full max-w-sm flex flex-col gap-sm">
<button class="w-full py-md rounded-xl bg-gradient-to-r from-primary-container to-secondary-container text-white font-label-md text-label-md shadow-lg shadow-primary-container/20 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-xs">
                Get Started
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="grid grid-cols-2 gap-sm">
<button class="glass-card py-sm px-md rounded-xl flex items-center justify-center gap-xs text-on-surface hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-body-md">login</span>
<span class="font-label-md text-label-md">Sign In</span>
</button>
<button class="glass-card py-sm px-md rounded-xl flex items-center justify-center gap-xs text-on-surface hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-body-md">explore</span>
<span class="font-label-md text-label-md">Explore</span>
</button>
</div>
</div>
<!-- Feature Chips -->
<div class="mt-xl flex flex-wrap justify-center gap-xs relative z-20">
<div class="flex items-center gap-xs px-md py-xs rounded-full glass-card border-blue-500/20">
<div class="w-2 h-2 rounded-full bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]"></div>
<span class="font-label-md text-label-md text-slate-300">Neural Engine v4.0</span>
</div>
<div class="flex items-center gap-xs px-md py-xs rounded-full glass-card border-violet-500/20">
<div class="w-2 h-2 rounded-full bg-violet-400 shadow-[0_0_8px_rgba(167,139,250,0.8)]"></div>
<span class="font-label-md text-label-md text-slate-300">Privacy Encrypted</span>
</div>
</div>
